services:
  mongodb:
    image: mongo:7
    container_name: dpi-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: dpi_engine

  backend:
    image: anujahirwar01/dpi-backend:latest
    container_name: dpi-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/dpi_engine
      PORT: 5000
      NODE_ENV: production
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb

  frontend:
    image: anujahirwar01/dpi-frontend:latest
    container_name: dpi-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
